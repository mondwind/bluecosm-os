---
modules:
  - type: dnf
    repos:
      cleanup: true
      nonfree: rpmfusion
      files:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
        - https://repo.vivaldi.com/stable/vivaldi-fedora.repo
        - warpdotdev.repo
      keys:
        - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
        - https://repo.vivaldi.com/stable/linux_signing_key.pub
        - https://releases.warp.dev/linux/keys/warp.asc
      copr:
        - atim/starship
        - che/zed
        - kylegospo/system76-scheduler
        - lihaohong/yazi
        - varlad/zellij
        - lilay/tealdeer
        - atim/bottom
    install:
      packages:
        # Gaming
        - gamescope
        - mangohud
        - system76-scheduler
        #- gamemode # already in base
        # Browsers
        - brave-browser
        - vivaldi-stable
        # Dev
        - tailscale
        - zed
        - micro
        - starship
        - lsd
        - kitty
        #- fd # already in base
        - yazi
        - zellij
        - warp-terminal
        - difftastic

        # Utils
        - ripgrep
        - http://cdn.filen.io/@filen/desktop/release/latest/Filen_linux_x86_64.rpm
        - repo: copr:copr.fedorainfracloud.org:lilay:tealdeer
          packages:
            - tealdeer
        - btop
        - bat
        - bottom
        #- dysk
        #- ouch
        #- lazygit
        - zoxide
        - arm-image-installer

        # Virt
        #- edk2-ovmf # already in base
        #- swtpm # already in base
        #- virt-manager # already in base
        # Fonts
        - rsms-inter-fonts

    remove:
      packages:
        - firefox
        - firefox-langpacks
        - linux-firmware-broadcom
        - linux-firmware-mediatek
        - linux-firmware-mellanox
        - linux-firmware-nxp
        - linux-firmware-qlogic
        - linux-firmware-ti
    group-install:
      packages:
        - virtualization

  - type: brew
    nofile-limits: true
    brew-analytics: false

  - type: systemd
    system:
      enabled:
        # virt service split up into daemons
        - libvirtd.socket
        - virtqemud.socket
        - virtnetworkd.socket
        - virtproxyd.socket

        - com.system76.Scheduler.service
        - tailscaled.service
      disabled:
        - NetworkManager-wait-online.service

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono
        - Hack
        - FiraCode
      google-fonts:
        - Roboto
        - Open Sans
        - Geist
        - Geist Mono

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - com.github.tchx84.Flatseal
      - notify: false
        scope: user
        repo:
          name: cosmic
          title: COSMIC
          url: https://apt.pop-os.org/cosmic/cosmic.flatpakrepo
