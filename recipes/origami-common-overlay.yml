modules:
  - type: dnf
    repos:
      cleanup: true
      nonfree: rpmfusion
      files:
        # Standard Repos
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
        - https://repo.vivaldi.com/stable/vivaldi-fedora.repo
        # Warp (Ensure this local file is valid, or use a direct URL if available)
        - warpdotdev.repo

        # COPR Repos (Manually pinned to Fedora 43 to fix "Chroot not found")
        - https://copr.fedorainfracloud.org/coprs/che/zed/repo/fedora-43/che-zed-fedora-43.repo
        - https://copr.fedorainfracloud.org/coprs/kylegospo/system76-scheduler/repo/fedora-43/kylegospo-system76-scheduler-fedora-43.repo
        - https://copr.fedorainfracloud.org/coprs/atim/bottom/repo/fedora-43/atim-bottom-fedora-43.repo

      keys:
        - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
        - https://repo.vivaldi.com/stable/linux_signing_key.pub
        - https://releases.warp.dev/linux/keys/warp.asc

    # REMOVED: copr: [...] section (Replaced by manual files above)

    install:
      packages:
        # Gaming
        - gamescope
        - mangohud
        - system76-scheduler
        # Browsers
        - brave-browser
        - vivaldi-stable
        # Dev tools
        - tailscale
        - zed
        - lsd
        - kitty
        - warp-terminal
        - difftastic
        # Utils
        - bottom
        # Direct RPM URLs should be handled carefully; dnf module supports them but
        # sometimes it's safer to download them in a separate 'files' module step if they fail here.
        - http://cdn.filen.io/@filen/desktop/release/latest/Filen_linux_x86_64.rpm

    remove:
      packages:
        - linux-firmware-broadcom
        - linux-firmware-mediatek
        - linux-firmware-mellanox
        - linux-firmware-nxp
        - linux-firmware-qlogic
        - linux-firmware-ti

    group-install:
      packages:
        - virtualization
