---
modules:
  - type: dnf
    repos:
      cleanup: true
      nonfree: rpmfusion
      files:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
        - https://repo.vivaldi.com/stable/vivaldi-fedora.repo
        - https://releases.warp.dev/linux/keys/warp.repo
      keys:
        - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
        - https://repo.vivaldi.com/stable/linux_signing_key.pub
        - https://releases.warp.dev/linux/keys/warp.asc
      copr:
        - che/zed
        - kylegospo/system76-scheduler
        - atim/bottom
    install:
      packages:
        # Gaming (not in Origami)
        - gamescope
        - mangohud
        - system76-scheduler
        - gamemode
        # Browsers (not in Origami)
        - brave-browser
        - vivaldi-stable
        # Dev tools (not in Origami)
        - tailscale
        - zed
        - lsd
        - kitty
        - fd
        - warp-terminal
        - difftastic
        # Utils (not in Origami)
        - http://cdn.filen.io/@filen/desktop/release/latest/Filen_linux_x86_64.rpm
        - bottom
        - dysk
        - ouch
        # Virt (not in Origami)
        - edk2-ovmf
        - swtpm
        - virt-manager
    remove:
      packages:
        - linux-firmware-broadcom
        - linux-firmware-mediatek
        - linux-firmware-mellanox
        - linux-firmware-nxp
        - linux-firmware-qlogic
        - linux-firmware-ti
    group-install:
      packages:
        - virtualization

  - type: systemd
    system:
      enabled:
        - libvirtd.socket
        - virtqemud.socket
        - virtnetworkd.socket
        - virtproxyd.socket
        - com.system76.Scheduler.service
        - tailscaled.service

  - type: fonts
    fonts:
      nerd-fonts:
        - Hack
        - FiraCode
      google-fonts:
        - Roboto
        - Open Sans
        - Geist
        - Geist Mono

  - type: brew
    nofile-limits: true
    brew-analytics: false
    auto-update: true
    auto-upgrade: true

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.github.tchx84.Flatseal
